version: 2

updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 10
    groups:
      google:
        patterns:
          - "google-*"
      anthropic:
        patterns:
          - "anthropic"
      fastapi:
        patterns:
          - "fastapi"
          - "uvicorn"
          - "starlette"
          - "pydantic*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
